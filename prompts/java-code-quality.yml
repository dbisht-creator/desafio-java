name: Java Code Quality Scanner
description: Analyzes Java code for quality issues, bugs, and improvements
model: openai/gpt-4o-mini
modelParameters:
  temperature: 0.3
messages:
  - role: system
    content: You are an expert Java code quality analyzer. Analyze Java code for bugs, code smells, performance issues, security vulnerabilities, and best practice violations. Provide actionable feedback.
  - role: user
    content: |
      Analyze the following Java code for quality issues and improvements:
      <code>
      {{input}}
      </code>
      
      Provide your analysis in the following format:
      Issues Found:
      - [List critical issues]
      Improvements:
      - [Code quality improvements]
      Security Concerns:
      - [Any security vulnerabilities]
testData:
  - input: |
      public class UserService {
        private String password;
        
        public void processUser(String input) {
          String query = "SELECT * FROM users WHERE id = " + input;
          executeQuery(query);
        }
      }
    expected: |
      Issues Found:
      - SQL Injection vulnerability in query construction
      - Missing null check for input parameter
      Improvements:
      - Use parameterized queries for database access
      - Add input validation and null checks
      Security Concerns:
      - Critical: Unprotected SQL injection vulnerability
evaluators:
  - name: Output should identify code quality issues
    string:
      contains: 'Issues'
  - name: Output should provide improvements
    string:
      contains: 'Improvements'
