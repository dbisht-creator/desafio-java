# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow requires that you have an existing account with codescan.io
# For more information about configuring your workflow,
# read our documentation at https://github.com/codescan-io/codescan-scanner-action
name: CodeScan

on:
  push:
    branches: [ "master" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "master" ]


permissions:
  contents: read
  models: read # required for github/codeql-action/upload-sarif to get the Action run status

jobs:
  CodeScan:
    if: false # Disable CodeScan analysis for now, as we are testing the AI model call separately. Remove this line to enable CodeScan.
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Java 17
        id: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Verify Java version
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
      - name: Cache files
        uses: actions/cache@v3
        with:
          path: |
            ~/.sonar
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Run Analysis
        uses: codescan-io/codescan-scanner-action@5b2e8c5683ef6a5adc8fa3b7950bb07debccce12
        with:
          login: ${{ secrets.CODESCAN_AUTH_TOKEN }}
          organization: ${{ secrets.CODESCAN_ORGANIZATION_KEY }}
          projectKey: ${{ secrets.CODESCAN_PROJECT_KEY }}
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: codescan.sarif

  call-model:
    permissions:
      models: read # required for github/codeql-action/upload-sarif to get the Action run status
      contents: read # for actions/checkout to fetch code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Read Java files for analysis
        id: read-java
        run: |
          java_files=$(find src/main/java -name "*.java" | head -5)
          java_content=""
          for file in $java_files; do
            java_content+="File: $file\n"
            java_content+="$(cat $file)\n\n"
          done
          echo "java_content<<EOF" >> $GITHUB_OUTPUT
          echo -e "$java_content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Call AI model for code analysis
        id: ai-analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JAVA_CONTENT: ${{ steps.read-java.outputs.java_content }}
        run: |
          payload=$(jq -n \
            --arg java_content "$JAVA_CONTENT" \
            '{
              "model": "openai/gpt-4o",
              "messages": [
                {
                  "role": "system",
                  "content": "You are an expert Java code quality analyzer. Analyze the provided Java code and generate a detailed markdown report of code issues, improvements, and security concerns."
                },
                {
                  "role": "user",
                  "content": ("Analyze the following Java code and provide findings in markdown format:\n\nJava Files:\n\n" + $java_content)
                }
              ]
            }')

          response=$(curl -s -w "\n%{http_code}" "https://models.github.ai/inference/chat/completions" \
             -H "Content-Type: application/json" \
             -H "Authorization: Bearer $GITHUB_TOKEN" \
             -d "$payload"
          )
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          echo "HTTP Status: $http_code"
          echo "Response: $body"
          
          if [ "$http_code" != "200" ]; then
            echo "API request failed with status $http_code"
            content="API Error: Status $http_code - $body"
          else
            # Extract the content from the response
            content=$(echo "$body" | jq -r '.choices[0].message.content // empty')
            if [ -z "$content" ]; then
              content="No analysis available"
            fi
          fi
          
          echo "analysis_result<<EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Generate markdown report
        run: |
          cat > code-findings.md << 'EOF'
          # Java Code Quality Analysis Report
          
          **Generated:** $(date)
          **Repository:** ${{ github.repository }}
          **Branch:** ${{ github.ref_name }}
          **Commit:** ${{ github.sha }}
          
          ## AI Model Analysis
          
          ${{ steps.ai-analysis.outputs.analysis_result }}
          
          ---
          
          *Report generated by automated code quality scan*
          EOF
          
          echo "## AI Code Analysis Report Generated" >> $GITHUB_STEP_SUMMARY
          echo '```markdown' >> $GITHUB_STEP_SUMMARY
          cat code-findings.md >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      
      - name: Upload findings as artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-findings
          path: code-findings.md